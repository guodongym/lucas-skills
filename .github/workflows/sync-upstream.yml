name: Sync Upstream Skills

on:
  schedule:
    - cron: '0 9 * * 1'  # 每周一 09:00 UTC
  workflow_dispatch:      # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Check for upstream updates
        id: check
        run: |
          output=$(python vendor.py check)
          echo "$output"
          # 提取所有显示 [UPDATE] 的行中的仓库名
          updated_names=$(echo "$output" | grep '\[UPDATE\]' | awk '{print $2}' | sed 's/://' | tr '\n' ',' | sed 's/,$//')
          echo "updated_names=$updated_names" >> $GITHUB_OUTPUT
          if [ -n "$updated_names" ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync upstream and create PR
        if: steps.check.outputs.has_updates == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          DATE=$(date +%Y-%m-%d)
          BRANCH="upstream-sync/$DATE"
          git checkout -b "$BRANCH"

          # 执行同步，保留输出作为 PR body 内容
          SYNC_OUTPUT=$(python vendor.py sync)
          echo "$SYNC_OUTPUT"

          # 提取真正有变动的技能文件夹名 (仅包含“新增”或“更新”的行)
          # 逻辑：找包含“新增|更新”的行 -> 取 "-> " 之后的内容 -> 取 ":" 之前的内容 -> 仅取文件夹名 (basename)
          CHANGED_SKILLS=$(echo "$SYNC_OUTPUT" | grep -E "新增|更新" | awk -F' -> ' '{print $2}' | awk -F: '{print $1}' | xargs -I {} basename {} | sort -u | tr '\n' ',' | sed 's/,$//')
          
          # 如果没有任何技能文件变动（可能只是 lock 更新了），则回退到使用仓库名
          if [ -z "$CHANGED_SKILLS" ]; then
            CHANGED_SKILLS="${{ steps.check.outputs.updated_names }}"
          fi

          git add -A
          if git diff --cached --quiet; then
            echo "同步后无文件变更，跳过 PR 创建。"
            exit 0
          fi

          # 构造符合规范的 Commit Message
          COMMIT_MSG="chore(skills): sync $CHANGED_SKILLS"
          git commit -m "$COMMIT_MSG" -m "Upstream repositories: ${{ steps.check.outputs.updated_names }}" -m "Synced at $DATE"
          git push origin "$BRANCH" --force

          # 写入 PR body 文件，避免变量展开和特殊字符问题
          cat > /tmp/pr-body.md << EOF
          ## 🤖 上游技能自动同步 ($DATE)

          检测到以下技能有更新：\`$CHANGED_SKILLS\`

          ### 📦 详细同步日志

          \`\`\`text
          ${SYNC_OUTPUT}
          \`\`\`

          ---
          > **提示**: 此 PR 由 GitHub Actions 自动生成。如果日志中出现 \`[WARN]\`，表示上游删除了文件，请手动检查是否需要同步删除本地文件。
          EOF

          gh pr create \
            --title "$COMMIT_MSG ($DATE)" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head "$BRANCH"
