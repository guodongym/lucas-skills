name: Sync Upstream Skills

on:
  schedule:
    - cron: '0 9 * * 1'  # 每周一 09:00 UTC
  workflow_dispatch:      # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Check for upstream updates
        id: check
        run: |
          output=$(python vendor.py check)
          echo "$output"
          if echo "$output" | grep -q '\[UPDATE\]'; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync upstream and create PR
        if: steps.check.outputs.has_updates == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="upstream-sync/$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"

          # 执行同步，保留输出作为 PR body 内容
          SYNC_OUTPUT=$(python vendor.py sync)
          echo "$SYNC_OUTPUT"

          git add -A
          if git diff --cached --quiet; then
            echo "同步后无文件变更，跳过 PR 创建。"
            exit 0
          fi

          git commit -m "chore: sync upstream skills $(date +%Y-%m-%d)"
          git push origin "$BRANCH"

          # 写入 PR body 文件，避免变量展开和特殊字符问题
          cat > /tmp/pr-body.md << EOF
          ## 上游技能同步

          GitHub Actions 检测到上游仓库有更新，已自动同步。请 review 变更后合并。

          ### 同步详情

          \`\`\`
          ${SYNC_OUTPUT}
          \`\`\`

          > 如上游删除了某些文件，vendor.py 不会自动删除本地文件，请留意 \`[WARN]\` 提示。
          EOF

          gh pr create \
            --title "chore: sync upstream skills $(date +%Y-%m-%d)" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head "$BRANCH"
