upstreams:
  - name: anthropics-skills
    repo: https://github.com/anthropics/skills
    branch: main
    mappings:
      - src: skills/skill-creator     # 上游路径（相对于仓库根）
        dst: skills/skill-creator     # 本地目标路径（相对于此文件所在目录）
      - src: skills/frontend-design
        dst: skills/frontend-design
      - src: skills/pdf
        dst: skills/pdf
      - src: skills/docx
        dst: skills/docx
      - src: skills/xlsx
        dst: skills/xlsx

  - name: khazix-skills
    repo: https://github.com/KKKKhazix/khazix-skills
    branch: main
    mappings:
      - src: hv-analysis
        dst: skills/hv-analysis
      - src: khazix-writer
        dst: skills/khazix-writer

  # 示例：添加更多上游
